<title>MagWigs</title>

<style>
* { box-sizing: border-box; }

body {
margin:0;
font-family:Arial;
background:black;
color:white;
}

.container {
max-width:700px;
margin:auto;
border:2px solid gold;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,215,0,0.3);
padding-bottom:20px;
}

.logo {
display:block;
margin:20px auto;
max-width:200px;
}

.hero {
text-align:center;
padding:20px;
}

.hero h1 {
color:gold;
font-size:28px;
margin:10px 0;
}

.ribbon {
background:linear-gradient(90deg,#b9832b,#f3d78a,#b9832b);
color:black;
text-align:center;
padding:12px;
font-weight:bold;
}

.form {
background:#111;
padding:20px;
max-width:550px;
margin:auto;
border-radius:15px;
}

.form-grid {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.full {
grid-column:span 2;
}

label {
color:gold;
display:block;
margin-bottom:5px;
font-size:14px;
}

input, select, textarea {
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #555;
background:#222;
color:white;
font-size:14px;
}

textarea {
height:90px;
}

button {
width:100%;
margin-top:15px;
padding:15px;
background:gold;
color:black;
border:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.whatsapp {
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

@media (max-width:600px) {
.form-grid { grid-template-columns:1fr; }
.full { grid-column:span 1; }
.container { width:95%; }
}
</style>
</head>

</html>
